<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>使用说明 - 小小工具箱</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fde8ec;
    min-height: 100vh;
    padding: 40px 16px 60px;
    -webkit-font-smoothing: antialiased;
}
.container {
    max-width: 720px;
    margin: 0 auto;
}
.page-title {
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #333;
    margin-bottom: 28px;
}
.step-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
}
.step-card {
    background: #fff;
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.step-num {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
}
.step-num.c1 { background: #f28b82; }
.step-num.c2 { background: #fbbc04; }
.step-num.c3 { background: #34a853; }
.step-num.c4 { background: #4285f4; }
.step-num.c5 { background: #9c27b0; }
.step-num.c6 { background: #ff6d00; }
.step-content h3 {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
}
.step-content p {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
}
.back-link {
    display: block;
    text-align: center;
    margin-top: 28px;
    color: #e57373;
    font-size: 14px;
    text-decoration: none;
}
.back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
    <h1 class="page-title">使用说明</h1>
    <div class="step-list">
        <div class="step-card">
            <div class="step-num c1">1</div>
            <div class="step-content">
                <h3>获取安装包</h3>
                <p>从官方渠道下载最新版本的安装包，确保来源安全可靠。</p>
            </div>
        </div>
        <div class="step-card">
            <div class="step-num c2">2</div>
            <div class="step-content">
                <h3>获取教程视频</h3>
                <p>观看配套教程视频，快速了解软件的核心功能与操作流程。</p>
            </div>
        </div>
        <div class="step-card">
            <div class="step-num c3">3</div>
            <div class="step-content">
                <h3>拿到你的专属授权码</h3>
                <p>联系客服或通过购买页面获取专属于你的授权激活码。</p>
            </div>
        </div>
        <div class="step-card">
            <div class="step-num c4">4</div>
            <div class="step-content">
                <h3>首次激活</h3>
                <p>打开软件后在激活页面粘贴授权码，点击激活即可完成。</p>
            </div>
        </div>
        <div class="step-card">
            <div class="step-num c5">5</div>
            <div class="step-content">
                <h3>使用方法</h3>
                <p>激活成功后即可使用全部功能，遇到问题可随时查阅帮助文档。</p>
            </div>
        </div>
        <div class="step-card">
            <div class="step-num c6">6</div>
            <div class="step-content">
                <h3>授权码过期了？</h3>
                <p>联系客服进行续期或重新购买，过期期间数据不会丢失。</p>
            </div>
        </div>
    </div>
    <a class="back-link" href="index.html">← 返回首页</a>
</div>
</body>
</html>
