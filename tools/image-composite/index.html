<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>溶图合成工具 - 小小工具箱</title>
  <meta name="description" content="图片溶图合成工具，支持批量套模板、自动抠图、多格式导出">
  <meta property="og:title" content="溶图合成工具 - 小小工具箱">
  <meta property="og:description" content="图片溶图合成工具，支持批量套模板">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="../libs/theme.css">
  <link rel="stylesheet" href="../libs/tailwind.min.css">
<script src="../libs/tailwind.js"></script>
  <script src="../libs/jszip.min.js"></script>
  <script src="../libs/FileSaver.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary, #f5f7fa);color:#1d2129;overflow:hidden;height:100vh}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-thumb{background:#d0d5dd;border-radius:3px}
    ::-webkit-scrollbar-track{background:transparent}
    input[type=range]{-webkit-appearance:none;height:4px;background:#e5e7eb;border-radius:2px;outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#f97316;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .checkerboard{background-image:linear-gradient(45deg,#e5e7eb 25%,transparent 25%),linear-gradient(-45deg,#e5e7eb 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e5e7eb 75%),linear-gradient(-45deg,transparent 75%,#e5e7eb 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .2s ease}
    .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 20px;border-radius:10px;font-size:13px;font-weight:500;color:#fff;pointer-events:none;animation:toastIn .3s ease,toastOut .3s ease 2.2s forwards}
    .toast-ok{background:#10b981}
    .toast-err{background:#ef4444}
    .toast-info{background:#6366f1}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes toastOut{from{opacity:1}to{opacity:0}}
  </style>
  <script type="module" src="../../assets/image-composite-BNpsHc13.js"></script>
  <link rel="modulepreload" href="../../assets/components-BPYpiByS.js">
</head>
<body>
  <div id="root"></div>
  <script>
  (function(){
    var t = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
    document.body.style.background = '';
  })();
  </script>
</body>
</html>
