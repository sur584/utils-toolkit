<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片批量处理工具</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f5f7fa;color:#1d2129;overflow:hidden;height:100%;min-height:100vh}
#root{height:100%;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d9dce4;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.animate-fade-up{animation:fadeUp .35s ease-out both}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:#e5e7eb;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#3b82f6;cursor:pointer;box-shadow:0 1px 4px rgba(59,130,246,.3)}
@media screen and (max-height:600px){
  body{overflow:auto}
  #root{height:auto;min-height:100vh}
}
@media screen and (max-width:900px){
  body{overflow:auto}
  #root{height:auto;min-height:100vh}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,useMemo}=React;

// ==================== 工具函数 ====================
// 格式化文件大小显示（如 1.5 MB）
const fmt=(b,d=1)=>{if(!b)return'0 B';const k=1024,s=['B','KB','MB','GB'],i=Math.floor(Math.log(b)/Math.log(k));return parseFloat((b/Math.pow(k,i)).toFixed(d))+' '+s[i]};
// 根据 MIME 类型获取文件扩展名
const ext=t=>({'image/jpeg':'jpg','image/png':'png','image/webp':'webp'})[t]||'jpg';
// 判断文件是否为支持的图片类型
const isImg=f=>['image/jpeg','image/png','image/webp'].includes(f.type);
// 生成随机唯一 ID
const uid=()=>Math.random().toString(36).slice(2,11);

// ==================== 全局状态管理（简易 Store） ====================
// 图片列表、监听器集合、当前标签页、选中集合、预览弹窗、预览图片、裁剪结果
let _images=[],_ls=new Set(),_tab='compress',_sel=new Set(),_preview=null,_previewImg=null,_cropResults=null;
// 订阅状态变化
const sub=fn=>{_ls.add(fn);return()=>_ls.delete(fn)};
// 通知所有监听器刷新 UI
const notify=()=>_ls.forEach(fn=>fn());
// 添加图片（支持批量），创建缩略图并获取宽高
const addImages=files=>{
  const v=Array.from(files).filter(isImg);if(!v.length)return;
  const n=v.map(f=>({id:uid(),file:f,origFile:f,origUrl:URL.createObjectURL(f),name:f.name,size:f.size,type:f.type,w:0,h:0,thumb:URL.createObjectURL(f),status:'idle',blob:null,cSize:null,cUrl:null,progress:0}));
  n.forEach(img=>{const t=new Image();t.onload=()=>{img.w=t.naturalWidth;img.h=t.naturalHeight;URL.revokeObjectURL(t.src);notify()};t.src=URL.createObjectURL(img.file)});
  _images=[..._images,...n];notify();
};
// 删除单张图片，释放内存
const rmImg=id=>{const i=_images.find(x=>x.id===id);if(i){URL.revokeObjectURL(i.thumb);if(i.cUrl)URL.revokeObjectURL(i.cUrl)}_images=_images.filter(x=>x.id!==id);_sel.delete(id);notify()};
// 清空所有图片
const clearAll=()=>{_images.forEach(i=>{URL.revokeObjectURL(i.thumb);if(i.cUrl)URL.revokeObjectURL(i.cUrl)});_images=[];_sel.clear();notify()};
// 更新单张图片属性
const upd=(id,u)=>{_images=_images.map(i=>i.id===id?{...i,...u}:i);notify()};
// 切换单张选中状态
const toggleSel=id=>{_sel.has(id)?_sel.delete(id):_sel.add(id);notify()};
// 全选/取消全选
const selAll=()=>{_images.forEach(i=>_sel.add(i.id));notify()};
const deselAll=()=>{_sel.clear();notify()};
// 设置预览弹窗数据
const setPreview=v=>{_preview=v;notify()};
// 设置当前预览图片（右侧大图）
const setPreviewImg=v=>{_previewImg=v;notify()};
// 设置裁剪结果（右侧裁剪预览面板）
const setCropResults=v=>{_cropResults=v;notify()};
const useStore=()=>{const[,t]=useState(0);useEffect(()=>{const u=sub(()=>t(x=>x+1));return u},[]);return{images:_images,tab:_tab,sel:_sel,preview:_preview,previewImg:_previewImg,cropResults:_cropResults,setPreviewImg}};

// Icons
const I={
  upload:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  image:()=><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
  zap:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
  scissors:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="6" cy="6" r="3"/><path d="M8.12 8.12 12 12"/><path d="M20 4 8.12 15.88"/><circle cx="6" cy="18" r="3"/><path d="M14.8 14.8 20 20"/></svg>,
  download:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
  x:()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  trash:()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
  check:()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
  plus:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  arrow:()=><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>,
  crop:()=><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6.13 1L6 16a2 2 0 0 0 2 2h15"/><path d="M1 6.13L16 6a2 2 0 0 1 2 2v15"/></svg>,
  folder:()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
  clipboard:()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect width="8" height="4" x="8" y="2" rx="1"/></svg>,
  chevDown:()=><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>,
  trending:()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg>,
  circle:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/></svg>,
  square:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>,
  roundedRect:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="6"/></svg>,
  grip:()=><svg width="6" height="20" viewBox="0 0 6 20" fill="currentColor"><circle cx="1.5" cy="2" r="1.5"/><circle cx="1.5" cy="7" r="1.5"/><circle cx="1.5" cy="12" r="1.5"/><circle cx="1.5" cy="17" r="1.5"/></svg>,
  eye:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
  refresh:()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
};

// ==================== 可拖动分割线组件 ====================
// 拖动可调整两侧面板的宽度，鼠标悬停显示拖拽手柄
function Divider({onDrag}){
  const [hovering,setHovering]=useState(false);
  const dragging=useRef(false);
  const handleDown=(e)=>{
    e.preventDefault();dragging.current=true;
    const onMove=(ev)=>{if(dragging.current)onDrag(ev.clientX)};
    const onUp=()=>{dragging.current=false;document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);document.body.style.cursor='';document.body.style.userSelect=''};
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    document.body.style.cursor='col-resize';document.body.style.userSelect='none';
  };
  return <div className="relative flex-shrink-0 w-1.5 cursor-col-resize group z-10 hover:bg-blue-200/50 transition-colors"
    onMouseDown={handleDown} onMouseEnter={()=>setHovering(true)} onMouseLeave={()=>setHovering(false)}>
    <div className={`absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-4 h-10 rounded bg-gray-300/60 group-hover:bg-blue-400 transition-colors flex items-center justify-center ${hovering?'opacity-100':'opacity-0 group-hover:opacity-100'}`}>
      <I.grip/>
    </div>
  </div>;
}

// ==================== 通用按钮组件 ====================
// variant: primary=蓝色主按钮, ghost=白色边框按钮, danger=红色危险按钮
// size: sm/md/lg, loading=显示加载动画
function Btn({children,variant='primary',size='md',disabled,loading,className='',...props}){
  const v={primary:'bg-blue-500 hover:bg-blue-600 text-white shadow-sm',ghost:'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50 hover:border-gray-300',danger:'bg-red-50 text-red-500 border border-red-100 hover:bg-red-100'};
  const s={sm:'px-3 py-1.5 text-xs gap-1.5',md:'px-4 py-2 text-sm gap-1.5',lg:'px-5 py-2.5 text-sm gap-2'};
  return <button disabled={disabled||loading} className={`inline-flex items-center justify-center font-medium rounded-lg transition-all duration-200 active:scale-[0.98] disabled:opacity-40 disabled:cursor-not-allowed ${v[variant]} ${s[size]} ${className}`} {...props}>{loading&&<span className="w-3.5 h-3.5 border-[1.5px] border-current border-t-transparent rounded-full animate-spin"/>}{children}</button>;
}

// ==================== 进度条组件 ====================
function Progress({value=0,label,className=''}){
  const v=Math.min(100,Math.max(0,value));
  return <div className={`w-full ${className}`}>
    {label&&<div className="flex items-center justify-between mb-1"><span className="text-xs text-gray-500">{label}</span><span className="text-xs text-gray-400">{Math.round(v)}%</span></div>}
    <div className="w-full h-1.5 rounded-full bg-gray-100 overflow-hidden"><div className="h-full rounded-full bg-blue-500 transition-all duration-500" style={{width:v+'%'}}/></div>
  </div>;
}

// ==================== 图片上传区域 ====================
// isButton=false: 大的拖拽上传区；isButton=true: 小的"添加图片"按钮
function UploadZone({isButton=false}){
  const ref=useRef(null);
  const handle=f=>{const v=Array.from(f).filter(isImg);if(v.length)addImages(v)};
  useEffect(()=>{
    const onPaste=e=>{const files=Array.from(e.clipboardData?.items||[]).filter(i=>i.type.startsWith('image/')).map(i=>i.getAsFile()).filter(Boolean).filter(isImg);if(files.length)addImages(files)};
    document.addEventListener('paste',onPaste);
    return()=>{document.removeEventListener('paste',onPaste)};
  },[]);
  if(isButton)return<>
    <button onClick={()=>ref.current?.click()} className="w-full flex items-center justify-center gap-2 py-2 px-3 rounded-lg border border-dashed border-gray-300 text-xs text-gray-500 hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50/50 transition-all"><I.plus/>添加图片</button>
    <input ref={ref} type="file" multiple accept="image/jpeg,image/png,image/webp" className="hidden" onChange={e=>{handle(e.target.files||[]);e.target.value=''}}/>
  </>;
  return <div onDrop={e=>{e.preventDefault();handle(e.dataTransfer?.files||[])}} onDragOver={e=>e.preventDefault()} onClick={()=>ref.current?.click()} className="flex flex-col items-center justify-center py-10 px-4 rounded-xl border-2 border-dashed border-gray-200 hover:border-blue-400 hover:bg-blue-50/30 cursor-pointer transition-all group">
    <div className="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center mb-2.5 group-hover:bg-blue-100 transition-colors text-blue-500"><I.upload/></div>
    <p className="text-sm font-medium text-gray-700 mb-0.5">拖拽图片到此处</p>
    <p className="text-xs text-gray-400">JPG, PNG, WebP</p>
    <input ref={ref} type="file" multiple accept="image/jpeg,image/png,image/webp" className="hidden" onChange={e=>{handle(e.target.files||[]);e.target.value=''}}/>
  </div>;
}

// ==================== 空状态占位 ====================
function EmptyState(){
  return <div className="flex-1 flex items-center justify-center h-full animate-fade-up">
    <div className="text-center max-w-xs">
      <div className="w-16 h-16 rounded-2xl bg-blue-50 flex items-center justify-center mx-auto mb-4 text-blue-500"><I.image/></div>
      <h2 className="text-lg font-semibold text-gray-800 mb-1.5">拖入图片开始处理</h2>
      <p className="text-xs text-gray-400 mb-5">支持 JPG、PNG、WEBP，可批量处理</p>
      <div className="flex items-center justify-center gap-4 mb-5 text-[11px] text-gray-400">
        <span className="flex items-center gap-1"><I.upload/>拖拽</span>
        <span className="flex items-center gap-1"><I.clipboard/>Ctrl+V</span>
        <span className="flex items-center gap-1"><I.folder/>选择</span>
      </div>
      <UploadZone isButton/>
    </div>
  </div>;
}

// ==================== 图片卡片（左侧列表） ====================
// 显示缩略图、文件名、大小、压缩率，支持选中/删除
function ImageCard({image,selected,isActive}){
  const s=image.cSize?((1-image.cSize/image.size)*100).toFixed(0):null;
  return <div className={`flex items-center gap-2 p-1.5 rounded-lg transition-colors group animate-fade-up ${isActive?'bg-blue-50 border border-blue-200':'hover:bg-gray-50 border border-transparent'}`}>
    <div onClick={e=>{e.stopPropagation();toggleSel(image.id)}} className={`w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 cursor-pointer transition-all ${selected?'bg-blue-500 border-blue-500':'border-gray-300 hover:border-blue-400'}`}>
      {selected&&<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20 6 9 17 4 12"/></svg>}
    </div>
    <div onClick={()=>setPreviewImg(image)} className="flex items-center gap-2 flex-1 min-w-0 cursor-pointer">
      <div className="w-9 h-9 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0"><img src={image.thumb} alt="" className="w-full h-full object-cover"/></div>
      <div className="flex-1 min-w-0">
        <p className="text-[13px] text-gray-800 truncate">{image.name}</p>
        <div className="flex items-center gap-1.5 mt-0.5">
          <span className="text-[11px] text-gray-400">{fmt(image.size)}</span>
          {s&&<span className="text-[11px] text-green-500">-{s}%</span>}
        </div>
      </div>
    </div>
    {image.status==='done'&&<span className="text-[11px] text-green-500">✓</span>}
    {image.status==='error'&&<span className="text-[11px] text-red-400">✗</span>}
    <button onClick={e=>{e.stopPropagation();rmImg(image.id)}} className="opacity-0 group-hover:opacity-100 p-1 rounded hover:bg-red-50 text-gray-300 hover:text-red-400 transition-all"><I.x/></button>
  </div>;
}

// ==================== 压缩面板 ====================
function CompressPanel(){
  const{images,sel}=useStore();
  // 目标大小、单位（KB/MB）、输出格式、是否正在处理
  const[ts,setTs]=useState(500);const[unit,setUnit]=useState('KB');const[fmt2,setFmt2]=useState('keep');const[proc,setProc]=useState(false);
  // 计算处理目标（有选中则处理选中，否则处理全部）
  const targets=sel.size>0?images.filter(i=>sel.has(i.id)):images;
  // 统计数据：原始大小、压缩后大小、已完成数、节省比例
  const tot=targets.reduce((a,i)=>a+i.size,0);const comp=targets.reduce((a,i)=>a+(i.cSize||0),0);
  const dn=targets.filter(i=>i.status==='done').length;const sv=comp>0?((1-comp/tot)*100).toFixed(1):0;

  // ==================== 快速 Canvas 压缩 ====================
  // 使用 Canvas + 二分法查找最佳质量，比 browser-image-compression 库快很多
  const compressFile=(file,targetBytes,maxW)=>new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.naturalWidth,h=img.naturalHeight;
      // 如果指定了最大宽度且图片超出，按比例缩小（大图压缩必须缩分辨率才能达标）
      if(maxW&&w>maxW){h=Math.round(h*maxW/w);w=maxW}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      // 二分法：在 [lo, hi] 区间内寻找满足目标大小的最佳质量
      let lo=0.1,hi=0.95,best=null;
      const outType=fmt2==='png'?'image/png':fmt2==='webp'?'image/webp':'image/jpeg';
      const tryQ=(q)=>{
        canvas.toBlob(b=>{
          if(!b){reject(new Error('canvas toBlob failed'));return}
          if(b.size<=targetBytes||lo>=hi){
            resolve(b);return;
          }
          if(b.size>targetBytes){hi=q-(hi-lo)/2}else{lo=q+(hi-lo)/2}
          if(hi-lo<0.02){resolve(b);return}
          tryQ((lo+hi)/2);
        },outType,q);
      };
      tryQ(0.76);
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });

  // ==================== 执行压缩（并行处理） ====================
  const compress=async()=>{
    setProc(true);const tb=unit==='MB'?ts*1024*1024:ts*1024;
    const pending=targets.filter(i=>i.status!=='done');
    // 最多 3 张并行压缩，提升速度
    const CONC=3;const results=[];
    let idx=0;
    const worker=async()=>{
      while(idx<pending.length){
        const img=pending[idx++];if(!img)break;
        const origState={blob:img.blob,cSize:img.cSize,cUrl:img.cUrl};
        upd(img.id,{status:'compressing',progress:30});
        try{
          // 智能缩放：压缩比越激进，缩小到越小的分辨率
          // 例：4MB→500KB (12.5%) 会缩到 1200px 宽
          const sizeRatio=tb/img.size;
          const maxW=sizeRatio<0.15?1200:sizeRatio<0.3?1920:sizeRatio<0.5?2560:99999;
          const c=await compressFile(img.file,tb,maxW);
          const url=URL.createObjectURL(c);
          upd(img.id,{status:'done',blob:c,cSize:c.size,cUrl:url,progress:100});
          results.push({name:img.name,origUrl:img.thumb,resultUrl:url,origSize:img.size,resultSize:c.size,blob:c,saving:((1-c.size/img.size)*100).toFixed(0)+'%',imgId:img.id,newFile:new File([c],img.name,{type:c.type}),newBlob:c,newThumb:url,newCSize:c.size,newCUrl:url,origState});
        }catch(e){upd(img.id,{status:'error'})}
      }
    };
    // 启动多个 worker 并行处理
    await Promise.all(Array.from({length:Math.min(CONC,pending.length)},()=>worker()));
    setProc(false);
    // 压缩完成后弹出预览窗口
    if(results.length)setPreview({type:'compress',items:results});
  };
  return <div className="h-full flex flex-col p-4 gap-3 overflow-y-auto animate-fade-up">
    <div className="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">
      <div className="flex items-center justify-between mb-3"><p className="text-sm font-medium text-gray-700">压缩设置</p>{sel.size>0&&<span className="text-[11px] text-blue-500">已选 {sel.size} 张</span>}</div>
      <div className="grid grid-cols-2 gap-3">
        <div><label className="text-xs text-gray-500 mb-1 block">目标大小</label><div className="flex items-center gap-1.5"><input type="number" value={ts} onChange={e=>setTs(Number(e.target.value))} className="flex-1 h-8 px-2.5 rounded-lg bg-gray-50 border border-gray-200 text-sm text-gray-800 outline-none focus:border-blue-400 transition-all"/><button onClick={()=>setUnit(u=>u==='KB'?'MB':'KB')} className="h-8 px-2.5 rounded-lg bg-gray-50 border border-gray-200 text-xs text-gray-600 hover:bg-gray-100 transition-colors font-medium min-w-[52px] flex items-center justify-center gap-0.5">{unit}<I.chevDown/></button></div></div>
        <div><label className="text-xs text-gray-500 mb-1 block">输出格式</label><select value={fmt2} onChange={e=>setFmt2(e.target.value)} className="w-full h-8 px-2.5 rounded-lg bg-gray-50 border border-gray-200 text-sm text-gray-600 outline-none cursor-pointer hover:bg-gray-100 transition-colors"><option value="keep">保持原格式</option><option value="jpg">JPG</option><option value="png">PNG</option><option value="webp">WEBP</option></select></div>
      </div>
    </div>
    {dn>0&&<div className="bg-white rounded-xl border border-gray-100 p-4 shadow-sm animate-fade-up">
      <div className="flex items-center gap-1.5 mb-2.5"><span className="text-green-500"><I.trending/></span><p className="text-sm font-medium text-gray-700">压缩统计</p></div>
      <div className="grid grid-cols-3 gap-3"><div><p className="text-[11px] text-gray-400">原始</p><p className="text-sm font-semibold text-gray-800">{fmt(tot)}</p></div><div><p className="text-[11px] text-gray-400">压缩后</p><p className="text-sm font-semibold text-blue-500">{fmt(comp)}</p></div><div><p className="text-[11px] text-gray-400">节省</p><p className="text-sm font-semibold text-green-500">{sv}%</p></div></div>
      <Progress value={dn/targets.length*100} label={`${dn}/${targets.length}`} className="mt-2.5"/>
    </div>}
    <div className="flex-1 space-y-1">
      <p className="text-[11px] text-gray-400 mb-1">图片列表 ({targets.length})</p>
      {targets.map((img,i)=><div key={img.id} className="flex items-center gap-2.5 p-2 rounded-lg bg-white border border-gray-100 hover:border-gray-200 transition-all animate-fade-up" style={{animationDelay:`${i*25}ms`}}>
        <div className="w-8 h-8 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0"><img src={img.thumb} alt="" className="w-full h-full object-cover"/></div>
        <div className="flex-1 min-w-0"><p className="text-[13px] text-gray-700 truncate">{img.name}</p><div className="flex items-center gap-1.5 mt-0.5"><span className="text-[11px] text-gray-400">{fmt(img.size)}</span>{img.cSize&&<><span className="text-[10px] text-gray-300">→</span><span className="text-[11px] text-blue-500">{fmt(img.cSize)}</span></>}</div></div>
        {img.status==='compressing'&&<Progress value={img.progress||0} className="w-16"/>}
        {img.status==='done'&&<span className="text-[11px] text-green-500 font-medium">完成</span>}
        {img.status==='error'&&<span className="text-[11px] text-red-400 font-medium">失败</span>}
      </div>)}
    </div>
    <div className="flex items-center gap-2 pt-1"><Btn variant="primary" className="flex-1" onClick={compress} disabled={!targets.length||proc} loading={proc}><I.zap/>{sel.size>0?`压缩选中 (${sel.size})`:'开始压缩'}</Btn><Btn variant="ghost" onClick={clearAll} disabled={!images.length}>清空</Btn></div>
  </div>;
}

// ==================== CROP PANEL ====================
const RATIO_PRESETS=[
  {l:'自由',v:null},{l:'1:1',v:1},{l:'4:3',v:4/3},{l:'3:4',v:3/4},
  {l:'16:9',v:16/9},{l:'9:16',v:9/16},{l:'4:5',v:4/5},{l:'5:4',v:5/4},
  {l:'3:2',v:3/2},{l:'2:3',v:2/3},{l:'2:1',v:2},{l:'1:2',v:0.5},
];
const SOCIAL_PRESETS=[
  {l:'Instagram 帖子',w:1080,h:1080},{l:'Instagram 故事',w:1080,h:1920},{l:'Instagram 横幅',w:1080,h:566},
  {l:'Facebook 帖子',w:1200,h:630},{l:'Facebook 封面',w:820,h:312},{l:'Twitter 帖子',w:1200,h:675},
  {l:'YouTube 缩略图',w:1280,h:720},{l:'YouTube 横幅',w:2560,h:1440},{l:'LinkedIn 帖子',w:1200,h:627},
  {l:'TikTok',w:1080,h:1920},{l:'小红书',w:1080,h:1440},{l:'微信朋友圈',w:1080,h:1080},
];
const SHAPE_OPTS=[{l:'矩形',v:'rect',icon:I.square},{l:'圆角',v:'rounded',icon:I.roundedRect},{l:'圆形',v:'circle',icon:I.circle}];

// ==================== 裁剪面板 ====================
function CropPanel(){
  const{images,sel,previewImg,setPreviewImg}=useStore();
  // 裁剪模式：manual=手动比例, percentage=百分比, pixels=像素, social=社媒预设, shape=形状
  const[mode,setMode]=useState('manual');
  const[ratio,setRatio]=useState(null);          // 手动模式的宽高比
  const[shape,setShape]=useState('rect');         // 形状模式：rect/rounded/circle
  const[borderRadius,setBorderRadius]=useState(20); // 圆角半径
  const[pctW,setPctW]=useState(100);const[pctH,setPctH]=useState(100); // 百分比模式
  const[pxW,setPxW]=useState(800);const[pxH,setPxH]=useState(600);     // 像素模式
  const[socialPreset,setSocialPreset]=useState(null); // 社媒预设
  // uniform=统一裁剪（所有图用同一裁剪框），individual=单独裁剪（每张图各自裁剪）
  const[batchMode,setBatchMode]=useState('uniform');
  const[idx,setIdx]=useState(0);                  // 当前编辑的图片索引
  const[processing,setProcessing]=useState(false);
  const containerRef=useRef(null);const imgRef=useRef(null);
  // 裁剪框位置和大小（相对于图片的像素坐标）
  const[cropBox,setCropBox]=useState({x:0,y:0,w:0,h:0});
  const[dragging,setDragging]=useState(null);     // 当前拖拽类型：move/nw/ne/sw/se
  const ds=useRef({mx:0,my:0,cx:0,cy:0,cw:0,ch:0}); // 拖拽起始状态快照

  // 与侧边栏同步：点击左侧图片列表时更新裁剪面板
  useEffect(()=>{
    if(previewImg){
      const i=images.findIndex(x=>x.id===previewImg.id);
      if(i>=0) setIdx(i);
    }
  },[previewImg]);

  const img=images[idx];

  // 计算图片在容器中的实际渲染位置和大小（居中，保持比例）
  const getImgRect=()=>{
    const imgEl=imgRef.current,cont=containerRef.current;
    if(!imgEl||!cont||!imgEl.naturalWidth)return null;
    const cw=cont.clientWidth,ch=cont.clientHeight;
    const nw=imgEl.naturalWidth,nh=imgEl.naturalHeight;
    const s=Math.min(cw/nw,ch/nh);
    const w=nw*s,h=nh*s;
    return{x:(cw-w)/2,y:(ch-h)/2,w,h};
  };

  // Init crop box in image-relative coords
  useEffect(()=>{
    if(!imgRef.current||!containerRef.current)return;
    const update=()=>{
      const ir=getImgRect();if(!ir)return;
      let cw,ch;
      if(mode==='pixels'){const s=Math.min(ir.w/pxW,ir.h/pxH);cw=pxW*s;ch=pxH*s}
      else if(mode==='social'&&socialPreset){const s=Math.min(ir.w/socialPreset.w,ir.h/socialPreset.h);cw=socialPreset.w*s;ch=socialPreset.h*s}
      else if(mode==='percentage'){cw=ir.w*pctW/100;ch=ir.h*pctH/100}
      else{cw=ir.w*0.8;ch=ir.h*0.8;if(ratio){if(cw/ch>ratio)ch=cw/ratio;else cw=ch*ratio;if(cw>ir.w){cw=ir.w;ch=cw/ratio}if(ch>ir.h){ch=ir.h;cw=ch*ratio}}}
      setCropBox({x:(ir.w-cw)/2,y:(ir.h-ch)/2,w:cw,h:ch});
    };
    const imgEl=imgRef.current;
    if(imgEl.complete)update();else imgEl.onload=update;
    return()=>{imgEl.onload=null};
  },[img,idx,mode,ratio,shape,socialPreset,pctW,pctH,pxW,pxH]);

  // cropBox is in image-relative coords — normalize to 0-1
  const getCropCoords=()=>{const r=getImgRect()||{x:0,y:0,w:1,h:1};return{x:cropBox.x/r.w,y:cropBox.y/r.h,w:cropBox.w/r.w,h:cropBox.h/r.h}};

  const handleDown=(e,type)=>{
    e.preventDefault();e.stopPropagation();setDragging(type);
    ds.current={mx:e.clientX,my:e.clientY,cx:cropBox.x,cy:cropBox.y,cw:cropBox.w,ch:cropBox.h};
  };

  useEffect(()=>{
    if(!dragging)return;
    const onMove=e=>{
      const ir=getImgRect();if(!ir)return;
      const dx=e.clientX-ds.current.mx,dy=e.clientY-ds.current.my;
      const{cx,cy,cw,ch}=ds.current;
      if(dragging==='move'){setCropBox(b=>({...b,x:Math.max(0,Math.min(ir.w-b.w,cx+dx)),y:Math.max(0,Math.min(ir.h-b.h,cy+dy))}));return}
      const ar=ratio||(mode==='social'&&socialPreset?socialPreset.w/socialPreset.h:null);
      let nw,nh,nx=cx,ny=cy;
      if(dragging==='se'){nw=Math.max(20,cw+dx);nh=ar?nw/ar:ch+dy}
      else if(dragging==='sw'){nw=Math.max(20,cw-dx);nh=ar?nw/ar:ch+dy;nx=cx+(cw-nw)}
      else if(dragging==='ne'){nw=Math.max(20,cw+dx);nh=ar?nw/ar:ch-dy;ny=cy+(ch-nh)}
      else if(dragging==='nw'){nw=Math.max(20,cw-dx);nh=ar?nw/ar:ch-dy;nx=cx+(cw-nw);ny=cy+(ch-nh)}
      else return;
      if(ar&&nh>ir.h){nh=ir.h;nw=nh*ar}
      if(nw>ir.w){nw=ir.w;if(ar)nh=nw/ar}
      nx=Math.max(0,Math.min(ir.w-nw,nx));ny=Math.max(0,Math.min(ir.h-nh,ny));
      if(nx+nw>ir.w)nw=ir.w-nx;if(ny+nh>ir.h)nh=ir.h-ny;
      setCropBox({x:nx,y:ny,w:nw,h:nh});
    };
    const onUp=()=>setDragging(null);
    document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    return()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp)};
  },[dragging,ratio,mode,socialPreset]);

  // ==================== 执行裁剪（Canvas 绘制） ====================
  const doCrop=async(srcFile)=>{
    const bmp=await createImageBitmap(srcFile);
    const c=getCropCoords(); // 获取归一化后的裁剪坐标 (0~1)
    // 将归一化坐标转为实际像素坐标
    const sx=Math.round(c.x*bmp.width),sy=Math.round(c.y*bmp.height);
    const dw=Math.round(c.w*bmp.width),dh=Math.round(c.h*bmp.height);
    const canvas=document.createElement('canvas');
    canvas.width=dw;canvas.height=dh;
    const ctx=canvas.getContext('2d');
    // 形状裁剪：圆形/圆角需要先裁剪再应用形状蒙版
    if(shape==='circle'){ctx.beginPath();ctx.ellipse(dw/2,dh/2,dw/2,dh/2,0,0,Math.PI*2);ctx.clip()}
    else if(shape==='rounded'){const r=borderRadius*Math.min(dw,dh)/200;ctx.beginPath();ctx.roundRect(0,0,dw,dh,r);ctx.clip()}
    ctx.drawImage(bmp,sx,sy,dw,dh,0,0,dw,dh);
    const outType=shape!=='rect'?'image/png':(srcFile.type||'image/jpeg');
    const cropped=await new Promise(r=>canvas.toBlob(r,outType,outType==='image/png'?1:0.95));
    bmp.close();
    return cropped;
  };

  // ==================== 应用裁剪：直接下载 ====================
  // 单张→直接下载，多张→打包 ZIP 下载
  const applyCropDirect=async()=>{
    if(!img)return;setProcessing(true);
    try{
      const cropped=await doCrop(img.blob||img.file);
      const baseName=img.name.replace(/\.[^.]+$/,'');
      const dlName=baseName+'_cropped.'+ext(cropped.type);
      saveAs(cropped, dlName);
    }catch(e){console.error('Crop failed:',e)}
    setProcessing(false);
  };

  // 批量裁剪并直接下载（单张直接下载，多张打包 ZIP）
  const applyCropAllDirect=async()=>{
    setProcessing(true);
    const targets=sel.size>0?images.filter(i=>sel.has(i.id)):images;
    if(targets.length===1){
      const t=targets[0];
      try{
        const cropped=await doCrop(t.blob||t.file);
        const baseName=t.name.replace(/\.[^.]+$/,'');
        saveAs(cropped, baseName+'_cropped.'+ext(cropped.type));
      }catch(e){}
    } else if(targets.length>1){
      const zip=new JSZip();
      for(const img of targets){
        try{
          const cropped=await doCrop(img.blob||img.file);
          const baseName=img.name.replace(/\.[^.]+$/,'');
          zip.file(baseName+'_cropped.'+ext(cropped.type), cropped);
        }catch(e){}
      }
      saveAs(await zip.generateAsync({type:'blob'}), 'cropped_images.zip');
    }
    setProcessing(false);
  };

  // ==================== 预览裁剪效果（显示在右侧面板） ====================
  const previewCropSingle=async()=>{
    if(!img)return;setProcessing(true);
    try{
      const origState={file:img.file,blob:img.blob,thumb:img.thumb,cSize:img.cSize,cUrl:img.cUrl};
      const cropped=await doCrop(img.blob||img.file);
      if(img.cUrl)URL.revokeObjectURL(img.cUrl);
      const baseName=img.name.replace(/\.[^.]+$/,'');
      const dlName=baseName+'_cropped.'+ext(cropped.type);
      const newFile=new File([cropped],dlName,{type:cropped.type});
      const url=URL.createObjectURL(cropped);
      upd(img.id,{file:newFile,blob:cropped,thumb:url,cSize:cropped.size,cUrl:url,status:'idle'});
      setCropResults([{name:dlName,origUrl:img.thumb,resultUrl:url,origSize:img.size,resultSize:cropped.size,blob:cropped,saving:((1-cropped.size/img.size)*100).toFixed(0)+'%',imgId:img.id,newFile,newBlob:cropped,newThumb:url,newCSize:cropped.size,newCUrl:url,origState}]);
    }catch(e){console.error('Crop preview failed:',e)}
    setProcessing(false);
  };

  // 批量预览裁剪效果
  const previewCropAll=async()=>{
    setProcessing(true);
    const targets=sel.size>0?images.filter(i=>sel.has(i.id)):images;
    const results=[];
    for(const img of targets){
      try{
        const origState={file:img.file,blob:img.blob,thumb:img.thumb,cSize:img.cSize,cUrl:img.cUrl};
        const cropped=await doCrop(img.blob||img.file);
        if(img.cUrl)URL.revokeObjectURL(img.cUrl);
        const baseName=img.name.replace(/\.[^.]+$/,'');
        const dlName=baseName+'_cropped.'+ext(cropped.type);
        const newFile=new File([cropped],dlName,{type:cropped.type});
        const url=URL.createObjectURL(cropped);
        upd(img.id,{file:newFile,blob:cropped,thumb:url,cSize:cropped.size,cUrl:url,status:'idle'});
        results.push({name:dlName,origUrl:img.thumb,resultUrl:url,origSize:img.size,resultSize:cropped.size,blob:cropped,saving:((1-cropped.size/img.size)*100).toFixed(0)+'%',imgId:img.id,newFile,newBlob:cropped,newThumb:url,newCSize:cropped.size,newCUrl:url,origState});
      }catch(e){}
    }
    if(results.length)setCropResults(results);
    setProcessing(false);
  };

  // 根据裁剪模式（统一/单独）选择对应的操作函数
  const handleApplyCrop=batchMode==='uniform'?applyCropAllDirect:applyCropDirect;
  const handlePreviewCrop=batchMode==='uniform'?previewCropAll:previewCropSingle;

  // 重置：恢复原图并重置裁剪框
  const resetCrop=()=>{
    const imgEl=imgRef.current,cont=containerRef.current;
    if(!imgEl||!cont)return;
    // 如果图片已经被裁剪过，恢复原图
    if(img.origFile&&img.file!==img.origFile){
      if(img.cUrl)URL.revokeObjectURL(img.cUrl);
      const newUrl=URL.createObjectURL(img.origFile);
      upd(img.id,{file:img.origFile,blob:img.origFile,thumb:newUrl,cSize:null,cUrl:null});
      setCropResults(null); // 清除裁剪结果面板
      return;
    }
    // 已经是原图，只重置裁剪框到默认的 80% 居中状态
    const doReset=()=>{
      if(!imgEl.naturalWidth){requestAnimationFrame(doReset);return}
      const cw=cont.clientWidth,ch=cont.clientHeight;
      const nw=imgEl.naturalWidth,nh=imgEl.naturalHeight;
      if(!nw||!nh||!cw||!ch)return;
      const s=Math.min(cw/nw,ch/nh);
      const iw=nw*s,ih=nh*s;
      let bw=iw*0.8,bh=ih*0.8;
      if(ratio){if(bw/bh>ratio)bh=bw/ratio;else bw=bh*ratio;if(bw>iw){bw=iw;bh=bw/ratio}if(bh>ih){bh=ih;bw=bh/ratio}}
      setCropBox({x:(iw-bw)/2,y:(ih-bh)/2,w:bw,h:bh});
    };
    doReset();
  };

  if(!img)return<EmptyState/>;

  const isCircle=shape==='circle';
  const ir=getImgRect()||{x:0,y:0,w:0,h:0};
  const bx=ir.x+cropBox.x,by=ir.y+cropBox.y;
  const boxStyle={left:bx,top:by,width:cropBox.w,height:cropBox.h,borderRadius:isCircle?'50%':shape==='rounded'?borderRadius+'px':'0'};

  return <div className="h-full flex flex-col overflow-hidden animate-fade-up">
    {/* Mode Tabs */}
    <div className="flex items-center gap-1 px-4 py-2 bg-white border-b border-gray-100 flex-shrink-0">
      {[{id:'manual',l:'手动'},{id:'percentage',l:'百分比'},{id:'pixels',l:'像素'},{id:'social',l:'社媒'},{id:'shape',l:'形状'}].map(m=>
        <button key={m.id} onClick={()=>setMode(m.id)} className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${mode===m.id?'bg-blue-500 text-white':'text-gray-500 hover:bg-gray-100'}`}>{m.l}</button>
      )}
      <div className="flex-1"/>
      <div className="flex items-center gap-1 bg-gray-100 rounded-lg p-0.5">
        <button onClick={()=>setBatchMode('uniform')} className={`px-2.5 py-1 rounded-md text-[11px] font-medium transition-all ${batchMode==='uniform'?'bg-white text-gray-800 shadow-sm':'text-gray-500'}`}>统一裁剪</button>
        <button onClick={()=>setBatchMode('individual')} className={`px-2.5 py-1 rounded-md text-[11px] font-medium transition-all ${batchMode==='individual'?'bg-white text-gray-800 shadow-sm':'text-gray-500'}`}>单独裁剪</button>
      </div>
    </div>

    {/* Controls */}
    <div className="px-4 py-3 bg-white border-b border-gray-100 flex-shrink-0">
      {mode==='manual'&&<div className="flex flex-wrap gap-1.5">
        {RATIO_PRESETS.map(p=><button key={p.l} onClick={()=>setRatio(p.v)} className={`px-2.5 py-1.5 rounded-lg text-xs font-medium transition-all border ${ratio===p.v?'bg-blue-50 text-blue-600 border-blue-200':'text-gray-500 border-gray-200 hover:bg-gray-50'}`}>{p.l}</button>)}
      </div>}
      {mode==='percentage'&&<div className="flex items-center gap-4">
        <div className="flex items-center gap-2 flex-1"><span className="text-xs text-gray-500 w-8">宽%</span><input type="range" min="1" max="100" value={pctW} onChange={e=>setPctW(Number(e.target.value))} className="flex-1"/><input type="number" value={pctW} onChange={e=>setPctW(Math.min(100,Math.max(1,Number(e.target.value))))} className="w-16 h-7 px-2 rounded-lg bg-gray-50 border border-gray-200 text-xs text-gray-700 outline-none text-center"/></div>
        <div className="flex items-center gap-2 flex-1"><span className="text-xs text-gray-500 w-8">高%</span><input type="range" min="1" max="100" value={pctH} onChange={e=>setPctH(Number(e.target.value))} className="flex-1"/><input type="number" value={pctH} onChange={e=>setPctH(Math.min(100,Math.max(1,Number(e.target.value))))} className="w-16 h-7 px-2 rounded-lg bg-gray-50 border border-gray-200 text-xs text-gray-700 outline-none text-center"/></div>
      </div>}
      {mode==='pixels'&&<div className="flex items-center gap-4">
        <div className="flex items-center gap-2"><span className="text-xs text-gray-500">宽</span><input type="number" value={pxW} onChange={e=>setPxW(Math.min(10000,Math.max(1,Number(e.target.value))))} className="w-20 h-7 px-2 rounded-lg bg-gray-50 border border-gray-200 text-xs text-gray-700 outline-none text-center"/><span className="text-[10px] text-gray-400">px</span></div>
        <span className="text-gray-300">×</span>
        <div className="flex items-center gap-2"><span className="text-xs text-gray-500">高</span><input type="number" value={pxH} onChange={e=>setPxH(Math.min(10000,Math.max(1,Number(e.target.value))))} className="w-20 h-7 px-2 rounded-lg bg-gray-50 border border-gray-200 text-xs text-gray-700 outline-none text-center"/><span className="text-[10px] text-gray-400">px</span></div>
      </div>}
      {mode==='social'&&<div className="grid grid-cols-4 gap-1.5 max-h-24 overflow-y-auto">
        {SOCIAL_PRESETS.map(p=><button key={p.l} onClick={()=>setSocialPreset(p)} className={`px-2 py-1.5 rounded-lg text-[11px] font-medium transition-all border text-left ${socialPreset?.l===p.l?'bg-blue-50 text-blue-600 border-blue-200':'text-gray-500 border-gray-200 hover:bg-gray-50'}`}><div>{p.l}</div><div className="text-[10px] text-gray-400">{p.w}×{p.h}</div></button>)}
      </div>}
      {mode==='shape'&&<div className="flex items-center gap-4">
        <div className="flex items-center gap-1.5">{SHAPE_OPTS.map(s=><button key={s.v} onClick={()=>setShape(s.v)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all border ${shape===s.v?'bg-blue-50 text-blue-600 border-blue-200':'text-gray-500 border-gray-200 hover:bg-gray-50'}`}><s.icon/>{s.l}</button>)}</div>
        {shape==='rounded'&&<div className="flex items-center gap-2 flex-1"><span className="text-xs text-gray-500">圆角</span><input type="range" min="5" max="100" value={borderRadius} onChange={e=>setBorderRadius(Number(e.target.value))} className="flex-1"/><span className="text-xs text-gray-500 w-8">{borderRadius}px</span></div>}
      </div>}
    </div>

    {/* Preview */}
    <div ref={containerRef} className="flex-1 relative bg-gray-100 m-3 rounded-xl overflow-hidden select-none">
      <img ref={imgRef} src={img.thumb} alt="" className="absolute inset-0 m-auto max-w-full max-h-full object-contain pointer-events-none"/>
      {/* Dark overlay outside image */}
      <div className="absolute inset-0 pointer-events-none" style={{background:isCircle
        ?`radial-gradient(ellipse ${cropBox.w/2}px ${cropBox.h/2}px at ${bx+cropBox.w/2}px ${by+cropBox.h/2}px, transparent 60%, rgba(0,0,0,.5) 100%)`
        :`linear-gradient(to right, rgba(0,0,0,.5) ${bx}px, transparent ${bx}px, transparent ${bx+cropBox.w}px, rgba(0,0,0,.5) ${bx+cropBox.w}px)`}}/>
      {!isCircle&&<><div className="absolute pointer-events-none" style={{left:0,right:0,top:0,height:by,background:'rgba(0,0,0,.5)'}}/><div className="absolute pointer-events-none" style={{left:0,right:0,top:by+cropBox.h,bottom:0,background:'rgba(0,0,0,.5)'}}/></>}
      {/* Crop box */}
      <div className="absolute border-2 border-white cursor-move" style={boxStyle} onMouseDown={e=>handleDown(e,'move')}>
        {!isCircle&&<div className="absolute inset-0 pointer-events-none">
          <div className="absolute left-1/3 top-0 bottom-0 w-px bg-white/40"/><div className="absolute left-2/3 top-0 bottom-0 w-px bg-white/40"/>
          <div className="absolute top-1/3 left-0 right-0 h-px bg-white/40"/><div className="absolute top-2/3 left-0 right-0 h-px bg-white/40"/>
        </div>}
        {[{t:'nw',c:'-top-1.5 -left-1.5 cursor-nw-resize'},{t:'ne',c:'-top-1.5 -right-1.5 cursor-ne-resize'},{t:'sw',c:'-bottom-1.5 -left-1.5 cursor-sw-resize'},{t:'se',c:'-bottom-1.5 -right-1.5 cursor-se-resize'}].map(h=>
          !isCircle&&<div key={h.t} className={`absolute w-2.5 h-2.5 bg-white rounded-sm shadow border border-gray-300 ${h.c}`} style={{transform:'translate(-50%,-50%)'}} onMouseDown={e=>handleDown(e,h.t)}/>
        )}
        <div className="absolute -top-5 left-1/2 -translate-x-1/2 px-1.5 py-0.5 rounded bg-black/60 text-white text-[10px] whitespace-nowrap">{Math.round(cropBox.w)}×{Math.round(cropBox.h)}</div>
      </div>
    </div>

    {/* Nav + Apply */}
    <div className="flex items-center justify-between px-4 py-2.5">
      <div className="flex items-center gap-2">
        <Btn variant="ghost" size="sm" onClick={()=>{const i=Math.max(0,idx-1);setIdx(i);setPreviewImg(images[i])}} disabled={idx===0}>上一张</Btn>
        <span className="text-xs text-gray-500">{idx+1}/{images.length}</span>
        <Btn variant="ghost" size="sm" onClick={()=>{const i=Math.min(images.length-1,idx+1);setIdx(i);setPreviewImg(images[i])}} disabled={idx===images.length-1}>下一张</Btn>
      </div>
      <div className="flex items-center gap-2">
        <Btn variant="ghost" size="sm" onClick={resetCrop}><I.refresh/>重置</Btn>
        <Btn variant="ghost" size="sm" onClick={handlePreviewCrop} disabled={processing} loading={processing}><I.eye/>预览效果</Btn>
        <Btn variant="primary" size="sm" onClick={handleApplyCrop} disabled={processing} loading={processing}><I.download/>{batchMode==='uniform'&&sel.size>0?`应用裁剪 (${sel.size})`:'应用裁剪'}</Btn>
      </div>
    </div>
  </div>;
}

// ==================== 下载面板 ====================
function DownloadPanel(){
  const{images}=useStore();
  // 已处理（有 blob）的图片、原始总大小、压缩后总大小、节省比例
  const proc=images.filter(i=>i.blob);const tot=images.reduce((a,i)=>a+i.size,0);
  const comp=proc.reduce((a,i)=>a+(i.cSize||i.size),0);const sv=comp>0?((1-comp/tot)*100).toFixed(1):0;
  const dl=img=>{const b=img.blob||img.file;saveAs(b,img.name.replace(/\.[^.]+$/,'')+'.'+ext(b.type||img.type))};
  const dlAll=async()=>{if(!proc.length)return;const zip=new JSZip();proc.forEach(img=>{const b=img.blob||img.file;zip.file(img.name.replace(/\.[^.]+$/,'')+'.'+ext(b.type||img.type),b)});saveAs(await zip.generateAsync({type:'blob'}),'images.zip')};
  return <div className="h-full flex flex-col p-4 gap-3 overflow-y-auto animate-fade-up">
    <div className="bg-white rounded-xl border border-gray-100 p-4 shadow-sm">
      <p className="text-sm font-medium text-gray-700 mb-2.5">下载概览</p>
      <div className="grid grid-cols-3 gap-3"><div><p className="text-[11px] text-gray-400">总图片</p><p className="text-lg font-semibold text-gray-800">{images.length}</p></div><div><p className="text-[11px] text-gray-400">已处理</p><p className="text-lg font-semibold text-blue-500">{proc.length}</p></div><div><p className="text-[11px] text-gray-400">压缩率</p><p className="text-lg font-semibold text-green-500">{sv}%</p></div></div>
    </div>
    <div className="flex-1">
      <div className="flex items-center px-3 py-1.5 text-[11px] text-gray-400 font-medium border-b border-gray-100"><span className="flex-1">文件名</span><span className="w-16 text-right">原始</span><span className="w-16 text-right">处理后</span><span className="w-12 text-right">节省</span><span className="w-12 text-right">操作</span></div>
      <div className="space-y-0.5">{images.map((img,i)=>{const has=!!img.blob;const s=has&&img.cSize?((1-img.cSize/img.size)*100).toFixed(0):null;return<div key={img.id} className="flex items-center px-3 py-2 rounded-lg hover:bg-gray-50 transition-colors animate-fade-up" style={{animationDelay:`${i*20}ms`}}>
        <div className="flex-1 flex items-center gap-2 min-w-0"><div className="w-7 h-7 rounded-lg overflow-hidden bg-gray-100 flex-shrink-0"><img src={img.thumb} alt="" className="w-full h-full object-cover"/></div><span className="text-[13px] text-gray-700 truncate">{img.name}</span></div>
        <span className="w-16 text-right text-[11px] text-gray-400">{fmt(img.size)}</span>
        <span className="w-16 text-right text-[11px] text-gray-500">{has?fmt(img.cSize||img.size):'-'}</span>
        <span className="w-12 text-right text-[11px] text-green-500 font-medium">{s?s+'%':'-'}</span>
        <div className="w-12 text-right">{has&&<button onClick={()=>dl(img)} className="text-[11px] text-blue-500 hover:text-blue-700 font-medium">下载</button>}</div>
      </div>})}
      </div>
    </div>
    <div><Btn variant="primary" className="w-full" onClick={dlAll} disabled={!proc.length}><I.download/>下载全部 (ZIP)</Btn></div>
  </div>;
}

// ==================== 压缩/裁剪结果预览弹窗 ====================
// 显示处理前后对比，支持移除/恢复，单张直接下载，多张打包 ZIP
function PreviewModal(){
  const{preview}=useStore();
  const[removed,setRemoved]=useState(new Set()); // 已移除的结果索引
  if(!preview)return null;
  const{items,type}=preview;
  const kept=items.filter((_,i)=>!removed.has(i));
  const close=()=>{
    items.forEach((item,i)=>{
      if(removed.has(i)&&item.imgId&&item.origState){
        upd(item.imgId,{...item.origState,status:'idle'});
      }
    });
    setPreview(null);
  };
  const toggleRemove=i=>setRemoved(s=>{const n=new Set(s);n.has(i)?n.delete(i):n.add(i);return n});
  return <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 animate-fade-up" onClick={close}>
    <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full mx-4 max-h-[85vh] flex flex-col overflow-hidden" onClick={e=>e.stopPropagation()}>
      <div className="flex items-center justify-between px-5 py-3 border-b border-gray-100">
        <h3 className="text-sm font-semibold text-gray-800">{type==='compress'?'压缩结果':'裁剪结果'} ({kept.length}/{items.length} 保留)</h3>
        <button onClick={close} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors"><I.x/></button>
      </div>
      <div className="flex-1 overflow-y-auto p-5">
        <div className="grid grid-cols-2 gap-4">
          {items.map((item,i)=>{
            const isOff=removed.has(i);
            return <div key={i} className={`relative bg-gray-50 rounded-xl p-3 animate-fade-up transition-all ${isOff?'opacity-40 grayscale':'hover:shadow-md'}`} style={{animationDelay:`${i*60}ms`}}>
              <button onClick={()=>toggleRemove(i)} className={`absolute top-2 right-2 z-10 w-6 h-6 rounded-full flex items-center justify-center text-white text-xs transition-all ${isOff?'bg-gray-400 hover:bg-gray-500':'bg-red-400 hover:bg-red-500'}`} title={isOff?'恢复此图':'移除此结果'}><I.x/></button>
              <p className={`text-[13px] font-medium truncate mb-2 ${isOff?'text-gray-400 line-through':'text-gray-700'}`}>{item.name}</p>
              <div className="flex gap-3 mb-3">
                <div className="flex-1 relative rounded-lg overflow-hidden bg-gray-200">
                  <img src={item.origUrl} alt="" className="w-full h-40 object-contain"/>
                  <span className="absolute bottom-1.5 left-1.5 px-1.5 py-0.5 rounded bg-black/50 text-white text-[10px]">原图</span>
                </div>
                <div className="flex-1 relative rounded-lg overflow-hidden bg-gray-200">
                  <img src={item.resultUrl} alt="" className="w-full h-40 object-contain"/>
                  <span className="absolute bottom-1.5 left-1.5 px-1.5 py-0.5 rounded bg-blue-500/80 text-white text-[10px]">{type==='compress'?'压缩后':'裁剪后'}</span>
                </div>
              </div>
              <div className="grid grid-cols-3 gap-2 text-center">
                <div><p className="text-[10px] text-gray-400">原始大小</p><p className="text-xs font-semibold text-gray-700">{fmt(item.origSize)}</p></div>
                <div><p className="text-[10px] text-gray-400">处理后</p><p className="text-xs font-semibold text-blue-500">{fmt(item.resultSize)}</p></div>
                <div><p className="text-[10px] text-gray-400">节省空间</p><p className="text-xs font-semibold text-green-500">{item.saving}</p></div>
              </div>
            </div>;
          })}
        </div>
      </div>
      <div className="flex items-center justify-end gap-2 px-5 py-3 border-t border-gray-100">
        <Btn variant="ghost" size="sm" onClick={close}>关闭</Btn>
        <Btn variant="primary" size="sm" disabled={!kept.length} onClick={async()=>{
          if(kept.length===1){saveAs(kept[0].blob,kept[0].name)}
          else{const zip=new JSZip();kept.forEach(it=>zip.file(it.name,it.blob));saveAs(await zip.generateAsync({type:'blob'}),'images.zip')}
          close()
        }}><I.download/>下载保留项 ({kept.length})</Btn>
      </div>
    </div>
  </div>;
}

// ==================== 裁剪结果预览面板（右侧） ====================
// 点击"预览效果"后显示，支持移除/恢复，一键下载
function CropResultsPanel(){
  const{cropResults}=useStore();
  const[removed,setRemoved]=useState(new Set());
  if(!cropResults||!cropResults.length)return null;
  const kept=cropResults.filter((_,i)=>!removed.has(i));
  const toggleRemove=i=>setRemoved(s=>{const n=new Set(s);n.has(i)?n.delete(i):n.add(i);return n});
  const downloadAll=async()=>{
    if(kept.length===1){saveAs(kept[0].blob,kept[0].name);return}
    if(kept.length>1){const zip=new JSZip();kept.forEach(it=>zip.file(it.name,it.blob));saveAs(await zip.generateAsync({type:'blob'}),'cropped_images.zip')}
  };
  return <div className="flex-1 flex flex-col bg-[#f5f7fa] overflow-hidden">
    <div className="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-100 flex-shrink-0">
      <div className="flex items-center gap-2">
        <span className="text-sm font-medium text-gray-700">裁剪预览</span>
        <span className="text-[11px] text-gray-400">{kept.length}/{cropResults.length} 保留</span>
      </div>
      <button onClick={()=>setCropResults(null)} className="p-1.5 rounded-lg hover:bg-gray-100 text-gray-400 hover:text-gray-600 transition-colors"><I.x/></button>
    </div>
    <div className="flex-1 overflow-y-auto p-4 space-y-3">
      {cropResults.map((item,i)=>{
        const isOff=removed.has(i);
        return <div key={i} className={`bg-white rounded-xl border border-gray-100 p-3 transition-all ${isOff?'opacity-40 grayscale':'hover:shadow-md'}`}>
          <div className="flex items-center justify-between mb-2">
            <p className={`text-[13px] font-medium truncate ${isOff?'text-gray-400 line-through':'text-gray-700'}`}>{item.name}</p>
            <button onClick={()=>toggleRemove(i)} className={`p-1 rounded-full transition-colors ${isOff?'bg-gray-200 text-gray-400 hover:bg-gray-300':'bg-red-50 text-red-400 hover:bg-red-100'}`} title={isOff?'恢复此图':'移除此结果'}>
              {isOff?<I.plus/>:<I.x/>}
            </button>
          </div>
          <div className="flex gap-2 mb-2">
            <div className="flex-1 relative rounded-lg overflow-hidden bg-gray-100">
              <img src={item.origUrl} alt="" className="w-full h-32 object-contain"/>
              <span className="absolute bottom-1 left-1 px-1.5 py-0.5 rounded bg-black/50 text-white text-[10px]">原图</span>
            </div>
            <div className="flex-1 relative rounded-lg overflow-hidden bg-gray-100">
              <img src={item.resultUrl} alt="" className="w-full h-32 object-contain"/>
              <span className="absolute bottom-1 left-1 px-1.5 py-0.5 rounded bg-blue-500/80 text-white text-[10px]">裁剪后</span>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div><p className="text-[10px] text-gray-400">原始</p><p className="text-xs font-semibold text-gray-700">{fmt(item.origSize)}</p></div>
            <div><p className="text-[10px] text-gray-400">裁剪后</p><p className="text-xs font-semibold text-blue-500">{fmt(item.resultSize)}</p></div>
            <div><p className="text-[10px] text-gray-400">节省</p><p className="text-xs font-semibold text-green-500">{item.saving}</p></div>
          </div>
        </div>;
      })}
    </div>
    <div className="flex items-center justify-end gap-2 px-4 py-3 border-t border-gray-100 bg-white flex-shrink-0">
      <Btn variant="ghost" size="sm" onClick={()=>setCropResults(null)}>关闭</Btn>
      <Btn variant="primary" size="sm" disabled={!kept.length} onClick={downloadAll}><I.download/>一键下载 ({kept.length})</Btn>
    </div>
  </div>;
}

// ==================== IMAGE PREVIEW ====================
function ImagePreview(){
  const{images,previewImg,cropResults}=useStore();
  if(cropResults&&cropResults.length)return <CropResultsPanel/>;
  const current=previewImg?images.find(i=>i.id===previewImg.id):null;
  if(!current)return <div className="flex-1 flex items-center justify-center bg-[#f5f7fa]"><p className="text-sm text-gray-400">点击左侧图片进行预览</p></div>;
  const s=current.cSize?((1-current.cSize/current.size)*100).toFixed(0):null;
  return <div className="flex-1 flex flex-col bg-[#f5f7fa] overflow-hidden">
    <div className="flex items-center justify-between px-4 py-2 bg-white border-b border-gray-100 flex-shrink-0">
      <div className="flex items-center gap-2 min-w-0">
        <span className="text-sm font-medium text-gray-700 truncate">{current.name}</span>
        <span className="text-[11px] text-gray-400 flex-shrink-0">{fmt(current.size)}</span>
        {current.cSize&&<span className="text-[11px] text-green-500 flex-shrink-0">→ {fmt(current.cSize)} ({s}%)</span>}
      </div>
      <div className="flex items-center gap-1.5 flex-shrink-0">
        {current.w>0&&<span className="text-[11px] text-gray-400">{current.w}×{current.h}</span>}
        <span className="text-[11px] text-gray-400 uppercase">{ext(current.type)}</span>
      </div>
    </div>
    <div className="flex-1 flex items-center justify-center p-4 overflow-hidden">
      <img src={current.thumb} alt="" className="max-w-full max-h-full object-contain rounded-lg shadow-sm"/>
    </div>
  </div>;
}

// ==================== 主应用组件 ====================
// 布局：顶部标题栏 → 左侧图片列表 | 中间功能面板 | 右侧预览 → 底部状态栏
function App(){
  const{images,tab,sel,preview,previewImg}=useStore();
  const has=images.length>0;
  const tabs=[{id:'compress',l:'压缩',icon:I.zap},{id:'crop',l:'裁剪',icon:I.scissors},{id:'download',l:'下载',icon:I.download}];
  const tot=images.reduce((a,i)=>a+i.size,0);const comp=images.reduce((a,i)=>a+(i.cSize||0),0);
  const selCount=sel.size;

  // 可拖动分割线：左侧列表宽度、右侧预览面板宽度
  const [sidebarW,setSidebarW]=useState(256);   // 左侧图片列表宽度（200~400px）
  const [rightW,setRightW]=useState(420);       // 右侧预览面板宽度（300~600px）
  const containerRef=useRef(null);
  const handleSidebarDrag=(clientX)=>{
    if(!containerRef.current)return;
    const rect=containerRef.current.getBoundingClientRect();
    setSidebarW(Math.max(200,Math.min(clientX-rect.left,400)));
  };
  const handleRightDrag=(clientX)=>{
    if(!containerRef.current)return;
    const rect=containerRef.current.getBoundingClientRect();
    setRightW(Math.max(300,Math.min(rect.right-clientX,600)));
  };

  return <div className="flex flex-col h-screen">
    <div className="flex items-center h-10 px-5 bg-white border-b border-gray-100 flex-shrink-0">
      <a href="../../" className="flex items-center gap-1 text-xs text-gray-400 hover:text-blue-500 transition-colors mr-4 no-underline">← 工具箱</a>
      <div className="flex items-center gap-2"><div className="w-5 h-5 rounded bg-blue-500 flex items-center justify-center text-white"><I.image/></div><span className="text-sm font-medium text-gray-700">图片批量处理</span></div>
    </div>
    <div ref={containerRef} className="flex flex-1 overflow-hidden">
      <div className="flex flex-col bg-white border-r border-gray-100 flex-shrink-0" style={{width:sidebarW}}>
        <div className="flex items-center justify-between px-3 py-2.5 border-b border-gray-50">
          <div className="flex items-center gap-1.5"><span className="text-[13px] font-medium text-gray-700">图片列表</span><span className="text-[10px] px-1.5 py-0.5 rounded bg-blue-50 text-blue-500 font-medium">{images.length}</span></div>
          {images.length>0&&<button onClick={clearAll} className="text-[11px] text-gray-400 hover:text-red-400 transition-colors flex items-center gap-0.5"><I.trash/>清空</button>}
        </div>
        {images.length>0&&<div className="flex items-center gap-2 px-3 py-2 border-b border-gray-50">
          <button onClick={selCount===images.length?deselAll:selAll} className="text-[11px] text-blue-500 hover:text-blue-700 font-medium">{selCount===images.length?'取消全选':'全选'}</button>
          {selCount>0&&<span className="text-[11px] text-gray-400">已选 {selCount}/{images.length}</span>}
        </div>}
        <div className="flex-1 overflow-y-auto p-1.5 space-y-0.5">{images.length===0?<div className="p-1.5"><UploadZone/></div>:images.map(img=><ImageCard key={img.id} image={img} selected={sel.has(img.id)} isActive={previewImg?.id===img.id}/>)}</div>
        {images.length>0&&<div className="p-2 border-t border-gray-50"><UploadZone isButton/></div>}
      </div>
      <Divider onDrag={handleSidebarDrag}/>
      <div className="flex-1 flex overflow-hidden bg-[#f5f7fa]">
        <div className="flex-1 flex flex-col overflow-hidden min-w-0">
          <div className="flex items-center gap-1 px-4 py-2 bg-white border-b border-gray-100 flex-shrink-0">
            {tabs.map(t=><button key={t.id} onClick={()=>{_tab=t.id;notify()}} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${tab===t.id?'bg-blue-500 text-white':'text-gray-500 hover:bg-gray-100'}`}><t.icon/>{t.l}</button>)}
          </div>
          <div className="flex-1 overflow-hidden">{!has?<EmptyState/>:<div key={tab} className="h-full">{tab==='compress'&&<CompressPanel/>}{tab==='crop'&&<CropPanel/>}{tab==='download'&&<DownloadPanel/>}</div>}</div>
        </div>
        {has&&<>
          <Divider onDrag={handleRightDrag}/>
          <div className="overflow-hidden flex flex-col flex-shrink-0" style={{width:rightW}}><ImagePreview/></div>
        </>}
      </div>
    </div>
    <div className="flex items-center justify-between h-6 px-5 bg-white border-t border-gray-100 flex-shrink-0">
      <div className="flex items-center gap-3 text-[11px] text-gray-400"><span>{images.length} 张</span><span>{fmt(tot)}</span>{comp>0&&<span className="text-blue-500">压缩后 {fmt(comp)} ({((1-comp/tot)*100).toFixed(1)}% 节省)</span>}</div>
      <div className="flex items-center gap-1 text-[11px] text-gray-400"><div className="w-1.5 h-1.5 rounded-full bg-green-400"/>就绪</div>
    </div>
    {preview&&<PreviewModal/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
