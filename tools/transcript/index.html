<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoTranscript - 视频文案提取</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-inner">
            <div style="display:flex;align-items:center;gap:8px">
                <a href="/" class="header-back-link" title="返回首页">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </a>
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </div>
                    <span class="logo-text">视频文案提取</span>
                </div>
            </div>
            <div class="header-actions">
                <a href="config.html" class="btn-icon" title="设置" style="text-decoration:none">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                </a>
                <button id="themeToggle" class="btn-icon" title="切换主题">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="container">
        <!-- Hero -->
        <section class="hero">
            <h1 class="hero-title">智能视频文案提取</h1>
            <p class="hero-subtitle">粘贴视频链接，AI 自动识别并提取文案内容</p>
        </section>

        <!-- 支持平台图标（由 JS 从 API 动态渲染） -->
        <div class="platform-icons"></div>

        <!-- 输入方式切换 -->
        <div class="tab-bar">
            <button class="tab-item active" data-tab="link" type="button">链接提取</button>
            <button class="tab-item" data-tab="upload" type="button">本地上传</button>
        </div>

        <!-- 搜索区域 -->
        <section class="search-section">
            <div class="tab-panel" data-panel="link">
                <div class="search-box">
                    <button id="pasteBtn" class="search-paste-btn" title="粘贴链接">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
                    </button>
                    <textarea id="urlInput" class="search-input" rows="1" placeholder="粘贴视频链接，支持抖音、TikTok、YouTube..."></textarea>
                    <button id="submitBtn" class="search-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        提取文案
                    </button>
                </div>
            </div>
            <div class="tab-panel" data-panel="upload" hidden>
                <div id="uploadZone" class="upload-zone">
                    <input type="file" id="fileInput" accept="video/*,audio/*" hidden>
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    <p class="upload-hint">点击或拖拽文件到此处上传</p>
                    <p class="upload-sub">支持 MP4/MOV/MKV 等视频，MP3/M4A/WAV 等音频，最大 500MB</p>
                    <p id="fileName" class="file-name" hidden></p>
                </div>
                <button id="uploadBtn" class="search-btn upload-submit-btn" disabled>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                    开始转文本
                </button>
            </div>
        </section>

        <!-- 进度区域 -->
        <div id="progressSection" class="progress-section" style="display:none">
            <div class="step-pills">
                <div class="step-pill" data-step="parsing">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    解析链接
                </div>
                <div class="step-pill" data-step="subtitles">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    获取字幕
                </div>
                <div class="step-pill" data-step="asr">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                    语音识别
                </div>
            </div>
            <div class="progress-info">
                <span id="statusMessage">准备中...</span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-track">
                <div id="progressBar" class="progress-bar-fill" style="width:0%"></div>
            </div>
        </div>

        <!-- 结果区域 -->
        <div id="resultArea" class="result-card" style="display:none">
            <div class="result-split">
                <!-- 左侧：视频预览 + 元信息 -->
                <div class="result-left">
                    <div id="videoPreview" class="video-preview">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </div>
                    <div class="video-info-grid">
                        <div class="info-cell">
                            <span class="info-label">平台</span>
                            <span id="videoPlatform" class="info-value">-</span>
                        </div>
                        <div class="info-cell">
                            <span class="info-label">视频时长</span>
                            <span id="videoDuration" class="info-value">-</span>
                        </div>
                        <div class="info-cell">
                            <span class="info-label">作者</span>
                            <span id="videoAuthor" class="info-value">-</span>
                        </div>
                    </div>
                </div>
                <!-- 右侧：标题文案 + 视频文案 -->
                <div class="result-right">
                    <div class="text-section">
                        <div class="section-label">标题文案：</div>
                        <div id="videoTitle" class="section-content title-content">-</div>
                    </div>
                    <div class="text-section">
                        <div class="section-label">视频文案：</div>
                        <div class="transcript-box">
                            <div id="transcriptText" class="transcript-text"></div>
                        </div>
                    </div>
                    <div class="export-bar">
                        <div class="export-actions">
                            <button id="copyBtn" class="btn btn-primary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
                                复制全文
                            </button>
                            <button id="downloadBtn" class="btn btn-secondary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                导出 TXT
                            </button>
                            <button id="downloadSrtBtn" class="btn btn-secondary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                导出 SRT
                            </button>
                            <button id="retryBtn" class="btn btn-secondary">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                                重新提取
                            </button>
                        </div>
                        <div class="export-stats">
                            <span>字数: <strong id="charCountStat">0</strong></span>
                            <span>预计阅读: <strong id="readTime">0 分钟</strong></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 错误区域 -->
        <div id="errorArea" class="error-card" style="display:none">
            <div class="error-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <p id="errorMessage" class="error-message"></p>
            <button id="retryFromErrorBtn" class="btn btn-secondary">重试</button>
        </div>
    </main>

    <!-- Toast 容器 -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
