<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理 - VideoTranscript</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div style="display:flex;align-items:center;gap:8px">
                <a href="index.html" class="header-back-link" title="返回">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </a>
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </div>
                    <span class="logo-text">配置管理</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="themeToggle" class="btn-icon" title="切换主题">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-header">
            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                返回
            </a>
            <h1>配置管理</h1>
        </div>

        <!-- Mode Toggle -->
        <section class="config-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                    ASR 模式
                </h2>
            </div>
            <div class="mode-toggle-card">
                <div class="mode-options">
                    <div class="mode-option" data-mode="local">
                        <div class="mode-option-title">本地模式</div>
                        <div class="mode-option-desc">使用本地 faster-whisper 或 .env 中配置的 API Key</div>
                    </div>
                    <div class="mode-option" data-mode="cloud">
                        <div class="mode-option-title">云模式</div>
                        <div class="mode-option-desc">使用 config.json 中配置的云端 ASR 服务商</div>
                    </div>
                </div>
                <div class="mode-hint">
                    本地模式：优先使用本地 faster-whisper，失败时回退到云端提供商<br>
                    云模式：支持任意 OpenAI 兼容 API 或 Whisper API（配置在下方提供商列表）
                </div>
            </div>
        </section>

        <!-- Cloud Provider Section (only visible in cloud mode) -->
        <section id="cloudSection" class="config-section" style="display:none">
            <div class="section-header">
                <h2 class="section-title">
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                    云 ASR 提供商
                </h2>
            </div>
            <div id="providerList" class="provider-list">
                <div class="loading-placeholder">正在加载配置...</div>
            </div>
            <button id="addProviderBtn" class="add-provider-btn" style="margin-top: 12px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                添加提供商
            </button>
        </section>

        <!-- Local ASR Info (only visible in local mode) -->
        <section id="localSection" class="config-section">
            <div class="section-header">
                <h2 class="section-title">
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
                    本地 ASR 状态
                </h2>
            </div>
            <div class="settings-card">
                <div id="localAsrInfo" class="settings-grid"></div>
            </div>
        </section>

        <!-- Import/Export -->
        <section id="importExportSection" class="config-section" style="display:none">
            <div class="section-header">
                <h2 class="section-title">
                    <svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导入 / 导出
                </h2>
            </div>
            <div class="import-export-bar">
                <button id="exportBtn" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    导出配置
                </button>
                <button id="importBtn" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    导入配置
                </button>
                <input type="file" id="importFile" accept=".json" hidden>
            </div>
        </section>
    </main>

    <div id="toastContainer" class="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/config.js"></script>
</body>
</html>
