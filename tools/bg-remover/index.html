<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能抠图 - 小小工具箱</title>
<meta name="description" content="AI智能抠图工具，一键去除图片背景，生成透明PNG，支持批量处理">
<meta property="og:title" content="智能抠图 - 小小工具箱">
<meta property="og:description" content="AI智能抠图工具，一键去除图片背景">
<meta property="og:type" content="website">
<link rel="stylesheet" href="../libs/theme.css">
<link rel="stylesheet" href="../libs/tailwind.min.css">
<script src="../libs/tailwind.js"></script>
<script src="../libs/jszip.min.js"></script>
<script src="../libs/FileSaver.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;height:100%;min-height:100vh}
[data-theme="light"] body{background-image:linear-gradient(135deg,#f4f5f9 0%,#f8f7fa 50%,#f5f8fa 100%)}
[data-theme="dark"] body{background-image:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(99,102,241,.03) 0%,transparent 50%),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(100,116,139,.03) 0%,transparent 50%)}
#root{height:100%;overflow:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:#d9dce4;border-radius:3px}
[data-theme="dark"] ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.animate-fade-up{animation:fadeUp .35s ease-out both}
[data-theme="light"] .checkerboard{background-color:#fff;background-image:linear-gradient(45deg,#e8e8e8 25%,transparent 25%),linear-gradient(-45deg,#e8e8e8 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#e8e8e8 75%),linear-gradient(-45deg,transparent 75%,#e8e8e8 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px}
[data-theme="dark"] .checkerboard{background-color:#1a1a2e;background-image:linear-gradient(45deg,#252540 25%,transparent 25%),linear-gradient(-45deg,#252540 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#252540 75%),linear-gradient(-45deg,transparent 75%,#252540 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px}
.editing *{cursor:none!important}
.editing button,.editing input,.editing select,.editing a{cursor:pointer!important}
@media screen and (max-height:600px){body{overflow:auto}#root{height:auto;min-height:100vh}}
@media screen and (max-width:900px){body{overflow:auto}#root{height:auto;min-height:100vh}}
</style>
  <script type="module" src="../../assets/bg-remover-Bo0FU0EE.js"></script>
  <link rel="modulepreload" href="../../assets/components-toN1JHeI.js">
  <link rel="modulepreload" href="../../assets/download-Cd8Q260w.js">
</head>
<body>
<div id="root"></div>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.body.style.background = '';
})();
</script>
</body>
</html>
